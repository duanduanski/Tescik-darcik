<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartka z Kalendarza</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-text: #ffffff;
            --secondary-text: #b0b0b0;
            --accent-color: #bb86fc;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            height: 24vh;
            display: flex;
            justify-content: center;
            align-items: center-top;
            overflow: hidden;
        }

        .calendar-card {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 90%;
            max-width: 350px;
            border: 1px solid #333;
        }

        .day-name {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
        }

        .day-number {
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .month-year {
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--secondary-text);
            margin-bottom: 0.5rem;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #333;
            padding-top: 0.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 1rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="calendar-card">
        <div id="dayName" class="day-name">---</div>
        <div id="dayNumber" class="day-number">--</div>
        <div id="monthYear" class="month-year">---</div>
        
        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-label">Tydzień</span>
                <span id="weekNumber" class="stat-value">--</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Dzień roku</span>
                <span id="dayOfYear" class="stat-value">--</span>
            </div>
        </div>
    </div>

    <script>
        function updateCalendar() {
            const now = new Date();
            
            // Podstawowe dane
            const dayNumber = now.getDate();
            const monthYear = now.toLocaleDateString('pl-PL', { month: 'long', year: 'numeric' });
            const dayName = now.toLocaleDateString('pl-PL', { weekday: 'long' });

            // Obliczanie numeru dnia roku
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            // Obliczanie numeru tygodnia (ISO 8601)
            const target = new Date(now.valueOf());
            const dayNr = (now.getDay() + 6) % 7;
            target.setDate(target.getDate() - dayNr + 3);
            const firstThursday = target.valueOf();
            target.setMonth(0, 1);
            if (target.getDay() !== 4) {
                target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
            }
            const weekNumber = 1 + Math.ceil((firstThursday - target) / 604800000);

            // Renderowanie danych
            document.getElementById('dayName').textContent = dayName;
            document.getElementById('dayNumber').textContent = dayNumber;
            document.getElementById('monthYear').textContent = monthYear;
            document.getElementById('dayOfYear').textContent = dayOfYear;
            document.getElementById('weekNumber').textContent = weekNumber;
        }

        // Inicjalizacja
        updateCalendar();
        
        // Odświeżanie co godzinę, aby zachować aktualność przy długim otwarciu
        setInterval(updateCalendar, 3600000);
    </script>
</body>
</html>
